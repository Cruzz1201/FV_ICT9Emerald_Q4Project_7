<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
        background-image:url(https://i.pinimg.com/1200x/b1/81/98/b18198277a5d29e1a5bda8c0d09bfd58.jpg);
        background-size:cover;
        background-repeat:no-repeat;
        }

        .login{
        background-color:rgba(255, 255, 255, 0.781);
        font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        text-align:center;
        width:400px;
        height:400px;
        margin-top:40px;
        border-radius:20px;
        padding:20px; 
        border: 1px solid rgb(0, 0, 0);
        
        }


    </style>
</head>
<body>

    
    <center>
    <div class="login"> 
    <form>

        <h2 style="margin-top:20px;">Login Form</h2>
        <label for="user">Username</label>
            <br>
            <input type="text" id="user" class="form-control" placeholder="Enter your Username" required>
            <br>  

        <label for="pass">Password</label>
            <br>
            <input type="password" id="pass" class="form-control" placeholder="Enter your Password" required>
            <br> 
        
        <p id="display" style="margin-left:20px;
        margin-right:20px;"></p>

        <div class="form-check form-switch d-inline-block  text-start">
        <input class="form-check-input" type="checkbox" id="Stay">

        <h6 style="font-size:15px;">Stay logged in on this account</h6>
        </div>

        <br>
        <input type="button" name="button" id="login" value="Login" onclick="authenticate()">
        <input type="reset" name="button" id="cancel" value="cancel">    
    
    </form>
    </div>

    <script>
        let attempt_counter = 0;


        function authenticate(){
            let username = document.getElementById("user").value;
            let pass = document.getElementById("pass").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Your account has been locked after 3 attempts. Wait 60 seconds before logging in again. ";


        while (attempt_counter < 3) {
        if (username === "ILOVEICT" && pass === "#ICT") {
            alert(granted);
            attempt_counter = 0; 
            document.getElementById("display").innerHTML = "";
            window.location.href = "notebook.html";
            break; 
        }


        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; 

        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("login").disabled = true; //lock
            }
    }
    }
    </script>

</div>
    
</body>
</html>
