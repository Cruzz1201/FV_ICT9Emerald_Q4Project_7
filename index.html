<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

    <style>
        body{
        background-image:url(https://i.pinimg.com/1200x/b1/81/98/b18198277a5d29e1a5bda8c0d09bfd58.jpg);
        background-size:cover;
        background-repeat:no-repeat;
        color:rgb(0, 0, 115);
        }

        .loginmain{
        background-color:rgba(255, 255, 255, 0.543);
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        text-align:center;
        width:400px;
        height:600px;
        margin-top:40px;
        border-radius:40px;
        padding:30px; 
        border: 3px solid rgb(252, 252, 252);
        
        }

        #usernamelabel , #passwordlabel {
        background-color:rgb(144, 192, 255); 
        width:100px; 
        height:25px; 
        border-radius:10px;
        
        }

        #login , #cancel{
        background-color:rgb(144, 192, 255); 
        width:90px; 
        height:30px; 
        border-radius:20px;
        border-color: rgba(240, 248, 255, 0.438);

        }

    </style>
</head>
<body>

    
    <center>
    <div class="loginmain"> 
    <form>

        <img src="https://static1.squarespace.com/static/664c7ae50eea9c731b37e817/t/66a84103b86799259e31ff25/1722302723941/Header.png?format=1500w" style="height:60px;">
        <h2 style="margin-top:20px; font-family:Bungee; font-weight:100; color:rgb(253, 253, 253); text-shadow:2px 2px rgb(168, 168, 168);">Welcome back, Montessorian!</h2>
        <hr>
        <label for="user" id="usernamelabel">Username</label>
            <br>
            <input type="text" id="user" class="form-control" placeholder="Enter your Username" required>
            <br>  

        <label for="pass" id="passwordlabel">Password</label>
            <br>
            <input type="password" id="pass" class="form-control" placeholder="********" required>
            <br> 
        
        <p id="display" style="margin-left:20px;
        margin-right:20px;"></p>

        <div class="form-check form-switch d-inline-block  text-start">
        <input class="form-check-input" type="checkbox" id="staylog">
        <label class="form-check-label" for="staylog" style="font-size:15px;">Stay logged in on this account</label>

  
        </div>
        <h6 style="color:rgb(96, 96, 96); font-size:10px;">Your session will remain <i>active</i> on this device</h6>

        <br>
        <input type="button" name="button" id="login" value="Login" onclick="authenticate()">
        <input type="reset" name="button" id="cancel" value="cancel">    
    
    </form>
    </div>

    <script>
        let attempt_counter = 0;

        function authenticate(){
            let username = document.getElementById("user").value;
            let pass = document.getElementById("pass").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Your account has been locked after 3 attempts. Wait 60 seconds before logging in again. ";


        while (attempt_counter < 3) {
        if (username === "OPpasta67" && pass === "Shasha") {
            alert(granted);
            attempt_counter = 0; 
            document.getElementById("display").innerHTML = "";
            window.location.href = "notebooks.html";
            break; 
        }

        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
                
            break; 

        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("login").disabled = true; //lock
            }
    }
    }
    </script>

</div>
    
</body>
</html>
